<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" width="220" height="220" role="img" aria-labelledby="title desc">
  <title id="title">Eclips Travels logo</title>
  <desc id="desc">A solar eclipse with a travel trail and horizon line</desc>
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08111f"/>
      <stop offset="55%" stop-color="#102740"/>
      <stop offset="100%" stop-color="#1d4f6f"/>
    </linearGradient>
    <linearGradient id="corona" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd67a"/>
      <stop offset="55%" stop-color="#ffb347"/>
      <stop offset="100%" stop-color="#ff8a3d"/>
    </linearGradient>
    <linearGradient id="trail" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7fd4df"/>
      <stop offset="100%" stop-color="#d5fbff"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="110" cy="110" r="104" fill="url(#sky)"/>
  <circle cx="110" cy="102" r="52" fill="none" stroke="url(#corona)" stroke-width="18" opacity="0.95" filter="url(#softGlow)"/>
  <circle cx="110" cy="102" r="46" fill="#04070d"/>

  <path d="M35 154 C72 132 115 135 186 172" fill="none" stroke="url(#trail)" stroke-width="10" stroke-linecap="round" opacity="0.95"/>
  <path d="M48 169 C84 154 125 157 178 186" fill="none" stroke="#0d2135" stroke-width="18" stroke-linecap="round" opacity="0.92"/>
  <path d="M48 169 C84 154 125 157 178 186" fill="none" stroke="#eef9ff" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>

  <path d="M68 63 C92 45 126 42 154 58" fill="none" stroke="#fff3cf" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <circle cx="152" cy="58" r="5" fill="#fff3cf"/>

  <path d="M60 176 L86 165" stroke="#ffb347" stroke-width="6" stroke-linecap="round"/>
  <path d="M141 184 L166 195" stroke="#ffb347" stroke-width="6" stroke-linecap="round"/>
</svg>
